<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>World Shooter — เกมทายธงประเทศ</title>
  
  <style>
    /* ---- STYLE พื้นฐาน ---- */
    * { 
      box-sizing: border-box; 
      margin: 0; 
      padding: 0; 
    }
    
    body {
      font-family: sans-serif;
      background: #f5f5f0;
      display: flex;
      justify-content: center;
      padding: 20px;
      min-height: 100vh;
    }
    
    .container { 
      width: 100%; 
      max-width: 680px; 
    }
    
    /* ---- หน้าแรก (HOME SCREEN) ---- */
    .home-title { 
      font-size: 24px; 
      font-weight: 600; 
      text-align: center; 
      margin-bottom: 4px; 
      color: #1a1a1a; 
    }
    
    .home-sub { 
      font-size: 14px; 
      color: #666; 
      text-align: center; 
      margin-bottom: 20px; 
    }
    
    .mode-cards { 
      display: grid; 
      grid-template-columns: repeat(3, 1fr); 
      gap: 10px; 
      margin-bottom: 16px; 
    }
    
    .mode-card { 
      background: #fff; 
      border: 1px solid #e0e0e0; 
      border-radius: 12px; 
      padding: 14px 8px; 
      text-align: center; 
      cursor: pointer; 
    }
    
    .mode-card.sel { 
      border-color: #185FA5; 
      background: #E6F1FB; 
    }
    
    .mode-card .icon { 
      font-size: 26px; 
      margin-bottom: 6px; 
    }
    
    .mode-card .mc-title { 
      font-size: 13px; 
      font-weight: 600; 
      color: #1a1a1a; 
    }
    
    .mode-card .mc-sub { 
      font-size: 11px; 
      color: #888; 
      margin-top: 2px; 
    }
    
    .lb-table { 
      width: 100%; 
      border-collapse: collapse; 
      font-size: 13px; 
      margin-bottom: 16px; 
    }
    
    .lb-table th { 
      text-align: left; 
      padding: 6px 8px; 
      color: #888; 
      border-bottom: 1px solid #eee; 
      font-weight: 400; 
    }
    
    .lb-table td { 
      padding: 6px 8px; 
      border-bottom: 1px solid #eee; 
      color: #1a1a1a; 
    }
    
    /* ---- หน้าเล่นเกม (GAME SCREEN) ---- */
    .hud { 
      display: flex; 
      justify-content: space-between; 
      align-items: center; 
      margin-bottom: 8px; 
      font-size: 13px; 
      color: #666; 
    }
    
    .hud strong { 
      color: #1a1a1a; 
    }
    
    .progress-bar { 
      height: 5px; 
      background: #e0e0e0; 
      border-radius: 3px; 
      margin-bottom: 10px; 
    }
    
    .progress-fill { 
      height: 100%; 
      background: #185FA5; 
      border-radius: 3px; 
      transition: width .3s; 
    }
    
    /* ฉากต่อสู้ */
    .arena { 
      position: relative; 
      background: #eef2f7; 
      border: 1px solid #d0d8e4; 
      border-radius: 14px; 
      height: 320px; 
      overflow: hidden; 
    }
    
    /* กล่องโจทย์ */
    .q-box { 
      position: absolute; 
      top: 12px; 
      left: 50%; 
      transform: translateX(-50%); 
      background: #fff; 
      border: 1px solid #ccc; 
      border-radius: 10px; 
      padding: 8px 18px; 
      font-size: 15px; 
      font-weight: 600; 
      color: #1a1a1a; 
      white-space: nowrap; 
      z-index: 10; 
      max-width: 90%; 
    }
