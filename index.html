<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Space Quiz Shooter — พิทักษ์ทวีปโลก</title>
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@400;700;900&display=swap" rel="stylesheet">
  
  <style>
    /* ---- ANIMATIONS ---- */
    @keyframes space-float {
      0%, 100% { transform: translateY(0px) translateX(0px); }
      50% { transform: translateY(-15px) translateX(5px); }
    }
    @keyframes laser-glow {
      0%, 100% { box-shadow: 0 0 10px #00f2fe, 0 0 20px #00f2fe; }
      50% { box-shadow: 0 0 20px #00f2fe, 0 0 40px #00f2fe; }
    }
    @keyframes shake-screen {
      0%, 100% { transform: translate(0, 0); }
      20%, 60% { transform: translate(-6px, 6px); }
      40%, 80% { transform: translate(6px, -6px); }
    }
    .shake-active { animation: shake-screen 0.2s ease-in-out; }

    /* ---- BASE STYLE ---- */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      font-family: 'Prompt', sans-serif;
      background: #060814;
      background-image: radial-gradient(circle at 50% 50%, #0b112c 0%, #060814 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      color: #ffffff;
      padding: 20px;
      overflow: hidden;
    }
    
    .game-container {
      width: 100%;
      max-width: 520px;
      background: rgba(13, 20, 48, 0.6);
      border: 4px solid #1f3275;
      border-radius: 28px;
      padding: 20px;
      box-shadow: 0 0 40px rgba(0, 242, 254, 0.15), inset 0 0 20px rgba(0,0,0,0.6);
    }

    /* ---- HUD SYSTEMS ---- */
    .hud-panel {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(0, 0, 0, 0.4);
      padding: 12px 20px;
      border-radius: 16px;
      border: 1px solid #1f3275;
      font-size: 14px;
      margin-bottom: 12px;
    }
    .hud-panel strong { color: #00f2fe; font-size: 18px; }
    .hearts { display: flex; gap: 4px; font-size: 18px; }
    
    .bar-container {
      height: 8px;
      background: rgba(0,0,0,0.5);
      border-radius: 4px;
      margin-bottom: 15px;
      overflow: hidden;
      border: 1px solid #1f3275;
    }
    .bar-fill { height: 100%; background: linear-gradient(90deg, #00f2fe, #4facfe); width: 0%; transition: width 0.3s; }

    /* ---- PLAY ARENA ---- */
    .arena {
      position: relative;
      width: 100%;
      height: 600px;
      background: #040610;
      background-image: radial-gradient(circle at 50% 80%, #0d153a 0%, #040610 80%);
      border: 3px solid #1f3275;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: inset 0 0 30px rgba(0,0,0,0.8);
    }

    .q-headline {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(4, 6, 16, 0.9);
      border: 2px solid #00f2fe;
      border-radius: 16px;
      padding: 12px 24px;
      font-size: 20px;
      font-weight: 800;
      color: #ffffff;
      text-align: center;
      z-index: 10;
      box-shadow: 0 0 15px rgba(0, 242, 254, 0.3);
      white-space: nowrap;
    }
    .q-headline span { color: #ecc94b; display: block; font-size: 24px; margin-top: 4px; }

    /* ธงเป้าหมายทรงกลมลอยตัวเรืองแสง */
    .target-bubble {
      position: absolute;
      display: flex;
      flex-direction: column;
      align-items: center;
      cursor: pointer;
      z-index: 5;
      animation: space-float 4s ease-in-out infinite;
    }
    .target-bubble .flag-circle {
      width: 75px;
      height: 75px;
      font-size: 44px;
      background: #101636;
      border: 3px solid #4facfe;
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      box-shadow: 0 0 15px rgba(79, 172, 254, 0.5);
      transition: transform 0.2s;
    }
    .target-bubble:hover .flag-circle { transform: scale(1.15); border-color: #00f2fe; }
    
    .target-bubble .label-text {
      margin-top: 6px;
      font-size: 12px;
      font-weight: 700;
      background: rgba(0,0,0,0.8);
      padding: 2px 8px;
      border-radius: 8px;
      border: 1px solid #1f3275;
      color: #fff;
    }

    /* จรวดผู้เล่นด้านล่าง */
    .player-rocket {
      position: absolute;
      bottom: 25px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 54px;
      z-index: 9;
      filter: drop-shadow(0 0 10px rgba(0,242,254,0.6));
    }

    /* ลำแสงเลเซอร์นีออน */
    .laser-beam {
      position: absolute;
      width: 6px;
      background: #00f2fe;
      border-radius: 3px;
      pointer-events: none;
      z-index: 8;
      animation: laser-glow 0.05s infinite;
    }

    .score-pop {
      position: absolute;
      font-size: 20px;
      font-weight: 900;
      pointer-events: none;
      z-index: 12;
    }

    /* ---- OVERLAYS & RESULTS ---- */
    .overlay {
      position: absolute;
      inset: 0;
      background: rgba(4, 6, 16, 0.95);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 20;
      padding: 30px;
      text-align: center;
      border-radius: 20px;
    }
    .overlay h2 { font-size: 32px; color: #00f2fe; margin-bottom: 10px; }
    .overlay p { color: #a0aec0; font-size: 16px; margin-bottom: 20px; }

    button.btn-action {
      padding: 12px 30px;
      font-size: 16px;
      font-weight: 700;
      background: linear-gradient(180deg, #00f2fe 0%, #4facfe 100%);
      border: none;
      color: #060814;
      border-radius: 12px;
      cursor: pointer;
      box-shadow: 0 0 15px rgba(0, 242, 254, 0.4);
    }

    .result-title { font-size: 28px; color: #ecc94b; font-weight: 900; text-align: center; margin-bottom: 20px; }
    .result-score-big { font-size: 64px; font-weight: 900; color: #00f2fe; text-align: center; }
    
    .grid-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 20px 0; }
    .stat-card { background: rgba(0,0,0,0.3); border: 1px solid #1f3275; border-radius: 12px; padding: 12px; text-align: center; }
    .stat-card .val { font-size: 22px; font-weight: 700; color: #fff; }
    .stat-card .lbl { font-size: 12px; color: #a0aec0; }

    .input-box-wrap { display: flex; gap: 8px; margin-bottom: 16px; }
    .input-box-wrap input { flex: 1; padding: 12px; background: rgba(0,0,0,0.4); border: 2px solid #1f3275; border-radius: 10px; color: #fff; font-size: 14px; }
    
    .menu-row { display: flex; gap: 10px; }
    .menu-row button { flex: 1; padding: 10px; font-size: 14px; background: rgba(255,255,255,0.05); border: 1px solid #1f3275; color: #fff; border-radius: 10px; cursor: pointer; }

    .screen { display: none; }
    .screen.active { display: block; }
    .lb-table { width: 100%; border-collapse: collapse; font-size: 14px; }
  </style>
</head>
<body>

<div class="game-container">
  
  <div class="screen active" id="scHome">
    <h1 style="font-size: 34px; font-weight: 900; text-align: center; color: #00f2fe; margin-bottom: 6px;">🚀 SPACE SHOOTER</h1>
    <p style="text-align: center; color: #a0aec0; font-size: 14px; margin-bottom: 25px;">ภารกิจยิงธงปกป้องพิกัตทวีปโลก</p>
    
    <div style="background: rgba(0,0,0,0.2); border: 1px solid #1f3275; border-radius: 16px; padding: 16px; margin-bottom: 20px; text-align: center;">
      <button class="btn-action" style="width: 100%;" onclick="startGame()">⚔️ เปิดระบบปล่อยยานรบ</button>
    </div>

    <p style="font-size: 14px; font-weight: 700; color: #ecc94b; margin-bottom: 8px;">🏆 อันดับบันทึกการบินสูงสุด (Top 10)</p>
    <table class="lb-table" id="lbTable"></table>
  </div>

  <div class="screen" id="scGame">
    <div class="hud-panel">
      <div>เวฟท้าทายที่ <strong id="lvlDisp">1</strong>/10</div>
      <div id="heartsDisp" class="hearts"></div>
      <div>พลังงาน EXP <strong id="scoreDisp">0</strong></div>
    </div>
    
    <div class="bar-container"><div class="bar-fill" id="progFill"></div></div>
    
    <div class="arena" id="arena">
      <div class="q-headline">ในทวีปนี้มีประเทศอะไรบ้าง? <span id="targetContinent">...</span></div>
      <div class="player-rocket" id="playerRocket">🚀</div>
      
      <div class="overlay" id="lvlOverlay">
        <h2>ระบบล็อกเป้าข้ามดวงดาว</h2>
        <p>ยิงทำลายธงทรงกลมที่สังกัดอยู่ในทวีปโจทย์เพื่อสะสมพลังงาน!</p>
        <button class="btn-action" onclick="hideOverlay()">เปิดระบบปืนแสง ⚔️</button>
      </div>
    </div>
  </div>

  <div class="screen" id="scResult">
    <div class="result-title">🎯 สรุปผลภารกิจพิทักษ์ทวีป</div>
    <div class="result-score-big" id="resScore">0</div>
    
    <div class="grid-stats">
      <div class="stat-card"><div class="val" id="resCorrect">0</div><div class="lbl">วิเคราะห์ถูกต้อง</div></div>
      <div class="stat-card"><div class="val" id="resStars">⭐</div><div class="lbl">เหรียญเกียรติยศ</div></div>
    </div>
    
    <div class="input-box-wrap">
      <input type="text" id="nameInput" placeholder="ระบุชื่อรหัสนักบินเพื่อบันทึกสถิติ" maxlength="14">
      <button class="btn-action" style="padding:10px 16px; font-size:14px;" onclick="saveScore()">จารึกข้อมูล</button>
    </div>
    
    <div class="menu-row">
      <button onclick="startGame()">บินอีกครั้ง</button>
      <button onclick="goHome()">🏠 หน้าหลัก</button>
    </div>
  </div>

</div>

<script>
const DATA = [
  { name: 'Thailand', flag: '🇹🇭', continent: 'Asia' },
  { name: 'Japan', flag: '🇯🇵', continent: 'Asia' },
  { name: 'India', flag: '🇮🇳', continent: 'Asia' },
  { name: 'China', flag: '🇨🇳', continent: 'Asia' },
  { name: 'South Korea', flag: '🇰🇷', continent: 'Asia' },
  { name: 'Vietnam', flag: '🇻🇳', continent: 'Asia' },
  { name: 'France', flag: '🇫🇷', continent: 'Europe' },
  { name: 'Germany', flag: '🇩🇪', continent: 'Europe' },
  { name: 'Italy', flag: '🇮🇹', continent: 'Europe' },
  { name: 'Spain', flag: '🇪🇸', continent: 'Europe' },
  { name: 'UK', flag: '🇬🇧', continent: 'Europe' },
  { name: 'Russia', flag: '🇷🇺', continent: 'Europe' },
  { name: 'USA', flag: '🇺🇸', continent: 'North America' },
  { name: 'Canada', flag: '🇨🇦', continent: 'North America' },
  { name: 'Mexico', flag: '🇲🇽', continent: 'North America' },
  { name: 'Brazil', flag: '🇧🇷', continent: 'South America' },
  { name: 'Argentina', flag: '🇦🇷', continent: 'South America' },
  { name: 'Egypt', flag: '🇪🇬', continent: 'Africa' },
  { name: 'Nigeria', flag: '🇳🇬', continent: 'Africa' },
  { name: 'Kenya', flag: '🇰🇪', continent: 'Africa' },
  { name: 'Australia', flag: '🇦🇺', continent: 'Oceania' }
];

const CONTINENTS = ['Asia', 'Europe', 'North America', 'South America', 'Africa'];

let currentLevel = 1, hp = 3, score = 0, correctCount = 0, gameActive = false;
let currentTargetContinent = '', usedContinents = [], enemies = [], leaderboard = [];

function shuffle(a) { return [...a].sort(() => Math.random() - .5); }
function rand(a) { return a[Math.floor(Math.random() * a.length)]; }

function show(id) {
  ['scHome', 'scGame', 'scResult'].forEach(s => document.getElementById(s).classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function goHome() { gameActive = false; clearEnemies(); show('scHome'); renderLB(); }

function startGame() {
  currentLevel = 1; hp = 3; score = 0; correctCount = 0; usedContinents = [];
  document.getElementById('scoreDisp').textContent = '0';
  document.getElementById('lvlDisp').textContent = '1';
  updateProgress(); renderHearts();
  show('scGame');
  document.getElementById('lvlOverlay').style.display = 'flex';
}

function hideOverlay() {
  document.getElementById('lvlOverlay').style.display = 'none';
  gameActive = true;
  spawnLevel();
}

function spawnLevel() {
  clearEnemies();
  
  let pool = CONTINENTS.filter(c => !usedContinents.includes(c));
  if(pool.length === 0) pool = CONTINENTS;
  currentTargetContinent = rand(pool);
  usedContinents.push(currentTargetContinent);
  document.getElementById('targetContinent').textContent = currentTargetContinent;

  const arena = document.getElementById('arena');
  
  let correctChoices = DATA.filter(c => c.continent === currentTargetContinent);
  let wrongChoices = DATA.filter(c => c.continent !== currentTargetContinent);
  
  let rightAns = rand(correctChoices);
  let wrongs = shuffle(wrongChoices).slice(0, 2);
  let finalChoices = shuffle([rightAns, ...wrongs]);

  finalChoices.forEach((choice, i) => {
    const el = document.createElement('div');
    el.className = 'target-bubble';
    el.innerHTML = '<div class="flag-circle">' + choice.flag + '</div><div class="label-text">' + choice.name + '</div>';
    
    const xPos = 40 + (i * 150) + (Math.random() * 20);
    const yPos = 160 + (Math.random() * 100);
    
    el.style.left = Math.max(15, Math.min(xPos, arena.offsetWidth - 95)) + 'px';
    el.style.top = yPos + 'px';
    el.style.animationDelay = (i * 0.4) + 's';
    
    el.dataset.correct = (choice.continent === currentTargetContinent);
    el.onclick = () => fireLaser(el, choice.continent === currentTargetContinent);
    
    arena.appendChild(el);
    enemies.push(el);
  });
}

function clearEnemies() { enemies.forEach(e => e.remove()); enemies = []; }

function fireLaser(target, isCorrect) {
  if (!gameActive) return;
  gameActive = false;
  
  const arena = document.getElementById('arena');
  const tRect = target.getBoundingClientRect();
  const aRect = arena.getBoundingClientRect();
  const pRect = document.getElementById('playerRocket').getBoundingClientRect();
  
  const startX = pRect.left - aRect.left + (pRect.width / 2);
  const startY = pRect.top - aRect.top;
  const endX = tRect.left - aRect.left + (tRect.width / 2);
  const endY = tRect.top - aRect.top + (tRect.height / 2);

  const beam = document.createElement('div');
  beam.className = 'laser-beam';
  beam.style.left = (startX - 3) + 'px';
  beam.style.top = endY + 'px';
  beam.style.height = (startY - endY) + 'px';
  
  const angle = Math.atan2(endX - startX, endY - startY);
  beam.style.transform = `rotate(${-angle}rad)`;
  beam.style.transformOrigin = 'bottom center';
  
  arena.appendChild(beam);

  setTimeout(() => {
    beam.remove();
    processHit(target, isCorrect, endX, endY);
  }, 100);
}

function processHit(target, isCorrect, ex, ey) {
  const arena = document.getElementById('arena');
  const pop = document.createElement('div');
  pop.className = 'score-pop';
  
  if (isCorrect) {
    score += 20; correctCount++;
    document.getElementById('scoreDisp').textContent = score;
    pop.style.cssText = `left: ${ex}px; top: ${ey - 40}px; color: #00f2fe; text-shadow: 0 0 10px #00f2fe;`;
    pop.textContent = '+20 EXP';
    arena.appendChild(pop);
    
    target.style.transform = 'scale(0)';
    target.style.transition = 'transform 0.2s';
    
    setTimeout(() => {
      pop.remove();
      target.remove();
      enemies = enemies.filter(e => e !== target);
      currentLevel++;
      
      if (currentLevel > 10) {
        endGameSession();
      } else {
        document.getElementById('lvlDisp').textContent = currentLevel;
        updateProgress();
        gameActive = true;
        spawnLevel();
      }
    }, 250);
  } else {
    hp--; renderHearts();
    arena.classList.add('shake-active');
    setTimeout(() => arena.classList.remove('shake-active'), 200);
    
    pop.style.cssText = `left: ${ex}px; top: ${ey - 40}px; color: #ff4d4d; text-shadow: 0 0 10px #ff4d4d;`;
    pop.textContent = '❌ ผิดทวีป! (-1 HP)';
    arena.appendChild(pop);
    
    setTimeout(() => pop.remove(), 700);
    if (hp <= 0) {
      setTimeout(() => endGameSession(true), 400);
    } else {
      gameActive = true;
    }
  }
}

function endGameSession(failed = false) {
  gameActive = false;
  const stars = failed ? '⭐' : (correctCount >= 9 ? '⭐⭐⭐' : '⭐⭐');
  document.getElementById('resScore').textContent = score;
  document.getElementById('resCorrect').textContent = correctCount + '/10';
  document.getElementById('resStars').textContent = stars;
  show('scResult');
}

function updateProgress() { document.getElementById('progFill').style.width = ((currentLevel - 1) / 10 * 100) + '%'; }
function renderHearts() { document.getElementById('heartsDisp').innerHTML = Array.from({ length: 3 }, (_, i) => '<span>' + (i < hp ? '❤️' : '🖤') + '</span>').join(''); }

function saveScore() {
  const name = document.getElementById('nameInput').value.trim() || 'Pilot-Anon';
  const stars = correctCount >= 9 ? '⭐⭐⭐' : correctCount >= 7 ? '⭐⭐' : '⭐';
  leaderboard.push({ name, score, stars });
  leaderboard.sort((a, b) => b.score - a.score);
  if (leaderboard.length > 10) leaderboard = leaderboard.slice(0, 10);
  document.getElementById('nameInput').value = '';
  goHome();
}

function renderLB() {
  const rows = leaderboard.map((e, i) => `<tr><td style="padding:8px; color:#ecc94b;">#${i+1}</td><td style="padding:8px;">${e.name}</td><td style="padding:8px; color:#00f2fe; font-weight:700;">${e.score}</td><td style="padding:8px;">${e.stars}</td></tr>`).join('');
  document.getElementById('lbTable').innerHTML = rows || '<tr><td colspan="4" style="text-align:center; color:#a0aec0; padding:12px;">ยังไม่มีบันทึกข้อมูล</td></tr>';
}

renderLB();
</script>
</body>
</html>
